services:
  - type: web
    name: afyapredict-ke
    env: python
    plan: free
    buildCommand: pip install uv && uv pip install -r requirements.txt --system
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afyapredict-ke-db
          property: connectionString
      - key: RETRAIN_API_KEY
        generateValue: true
      - key: KENYA_CONTEXT
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: afyapredict-ke-db
    databaseName: afyapredict
    user: afyapredict
    plan: free